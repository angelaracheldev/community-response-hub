$kind: http-request
name: Update Category
method: PATCH
url: '{{baseUrl}}/api/v1/categories/:id'
order: 4000
pathVariables:
  - key: id
    value: '{{categoryId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "categoryName": "Infrastructure & Roads",
      "description": "Updated description"
    }
