$kind: http-request
name: Update User
method: PATCH
url: '{{baseUrl}}/api/v1/users/:id'
order: 3000
pathVariables:
  - key: id
    value: '{{userId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Doe",
      "phoneNumber": "+0987654321",
      "address": "456 Oak Ave"
    }
