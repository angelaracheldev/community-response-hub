$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/v1/auth/register'
order: 1000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "John",
      "lastName": "Doe",
      "email": "john.doe@example.com",
      "password": "password123",
      "phoneNumber": "+1234567890",
      "address": "123 Main St"
    }
