$kind: http-request
name: Update Complaint Status
method: PATCH
url: '{{baseUrl}}/api/v1/complaints/:id/status'
order: 5000
pathVariables:
  - key: id
    value: '{{complaintId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "complaintStatus": "in_progress"
    }
