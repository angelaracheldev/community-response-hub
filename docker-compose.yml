version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: community-response-hub-db
    environment:
      POSTGRES_USER: ${DB_USER:-crh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crh_password_dev}
      POSTGRES_DB: ${DB_NAME:-community_response_hub}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crh_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crh-network

  backend:
    build:
      context: ./backend
    container_name: community-response-hub-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-crh_user}
      DB_PASSWORD: ${DB_PASSWORD:-crh_password_dev}
      DB_NAME: ${DB_NAME:-community_response_hub}
      API_PORT: 5000
      API_HOST: 0.0.0.0
      NODE_ENV: development
      FRONTEND_URL: http://localhost:8081
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - crh-network

volumes:
  postgres_data:
    driver: local

networks:
  crh-network:
    driver: bridge
