openapi: 3.0.3

info:
  title: Community Incident Reporting & Response Platform API
  description: |
    API for the Community Incident Reporting & Response Platform.

    Aligned with database ERD (USER, ROLE, RESIDENT_VERIFICATIONS, COMPLAINTS,
    COMPLAINT_CATEGORIES, COMPLAINT_MEDIA, COMPLAINT_ASSIGNMENTS, ACTIVITY_LOGS,
    EMERGENCY_HOTLINES).

    FAQs are out of scope for this API version (resident FAQs remain client-side or static content).

    Roles: Admin, Resident, Responder.

    Privacy: Complainant residentId is hidden from Responder responses. Admin sees full PII.
    Verification documents are temporary and removed after admin review.
  version: 1.2.0

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development

tags:
  - name: Auth
    description: Authentication and account endpoints
  - name: Users
    description: User management endpoints
  - name: Verifications
    description: Resident verification (RESIDENT_VERIFICATIONS table)
  - name: Assignments
    description: Complaint officer assignments (COMPLAINT_ASSIGNMENTS table)
  - name: Complaints
    description: Complaint reporting and workflow endpoints
  - name: Media
    description: Complaint media upload and management endpoints
  - name: Activity Logs
    description: Audit trail and complaint history endpoints
  - name: Categories
    description: Complaint category endpoints
  - name: Emergency Hotlines
    description: Emergency hotline endpoints
  - name: Dashboard
    description: Summary and analytics endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Unauthorized
        error:
          type: string
          example: Invalid token

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request successful

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: resident@example.com
        password:
          type: string
          example: P@ssw0rd123

    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Dela Cruz
        email:
          type: string
          format: email
          example: juan.delacruz@example.com
        password:
          type: string
          example: P@ssw0rd123
        phoneNumber:
          type: string
          example: "09171234567"
        profileImageUrl:
          type: string
          example: https://example.com/profile.jpg

    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Dela Cruz
        phoneNumber:
          type: string
          example: "09171234567"
        profileImageUrl:
          type: string
          example: https://example.com/profile.jpg

    VerificationSubmitRequest:
      type: object
      required:
        - verificationType
        - address
        - file
      properties:
        verificationType:
          type: string
          enum:
            - ID
            - UTILITY_BILL
            - BARANGAY_CERTIFICATE
            - OTHER
          example: ID
        address:
          type: string
          description: Maps to RESIDENT_VERIFICATIONS.ADDRESS
          example: Block 10 Lot 5, Barangay Example
        file:
          type: string
          format: binary
          description: Proof of residency. Deleted from storage after admin review.

    VerificationReviewRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Maps to RESIDENT_VERIFICATIONS.STATUS
          enum:
            - APPROVED
            - REJECTED
          example: APPROVED
        remarks:
          type: string
          example: Valid government ID presented.

    ResidentVerification:
      type: object
      description: RESIDENT_VERIFICATIONS table
      properties:
        verificationId:
          type: integer
          example: 1
        userId:
          type: integer
          example: 1
        verificationType:
          type: string
          example: ID
        documentUrl:
          type: string
          nullable: true
          description: Admin only during review. Not returned after approval.
        address:
          type: string
          example: Block 10 Lot 5, Barangay Example
        status:
          type: string
          enum:
            - PENDING
            - APPROVED
            - REJECTED
          example: PENDING
        reviewedBy:
          type: integer
          nullable: true
          example: 3
        submittedAt:
          type: string
          format: date-time
          example: 2026-06-01T10:00:00Z
        reviewedAt:
          type: string
          format: date-time
          nullable: true

    User:
      type: object
      description: USER table. Verification details in ResidentVerification.
      properties:
        userId:
          type: integer
          description: USER_ID
          example: 1
        roleId:
          type: integer
          description: ROLE_ID
          example: 2
        roleName:
          type: string
          example: Resident
        residentId:
          type: string
          nullable: true
          description: RESIDENT_ID (optional resident reference code)
          example: RES-2026-0001
        employeeCode:
          type: string
          nullable: true
          description: EMPLOYEE_CODE (Responder/Admin staff code)
          example: EMP-004
        firstName:
          type: string
          example: Juan
        lastName:
          type: string
          example: Dela Cruz
        email:
          type: string
          format: email
          example: juan.delacruz@example.com
        phoneNumber:
          type: string
          example: "09171234567"
        isVerified:
          type: boolean
          description: USER.IS_VERIFIED (true when latest verification is APPROVED)
          example: false
        isActive:
          type: boolean
          example: true
        profileImageUrl:
          type: string
          example: https://example.com/profile.jpg
        latestVerification:
          $ref: '#/components/schemas/ResidentVerification'
        createdAt:
          type: string
          format: date-time
          example: 2026-06-01T08:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-01T09:00:00Z

    Role:
      type: object
      description: ROLE table
      properties:
        roleId:
          type: integer
          example: 1
        roleName:
          type: string
          enum:
            - Admin
            - Resident
            - Responder
          example: Admin
        roleLevel:
          type: integer
          example: 10

    ComplaintCategory:
      type: object
      description: COMPLAINT_CATEGORIES table
      properties:
        categoryId:
          type: integer
          description: CATEGORY_ID
          example: 1
        categoryName:
          type: string
          example: Noise Complaint
        description:
          type: string
          example: Loud music, karaoke, or other excessive noise issues

    ComplaintCategoryCreateRequest:
      type: object
      required:
        - categoryName
      properties:
        categoryName:
          type: string
          example: Noise Complaint
        description:
          type: string
          example: Loud music, karaoke, or other excessive noise issues

    ComplaintCategoryUpdateRequest:
      type: object
      properties:
        categoryName:
          type: string
          example: Noise Complaint
        description:
          type: string
          example: Updated category description

    ComplaintAssignment:
      type: object
      description: COMPLAINT_ASSIGNMENTS table
      properties:
        assignmentId:
          type: integer
          example: 1
        complaintId:
          type: integer
          example: 101
        assignedTo:
          type: integer
          description: ASSIGNED_TO (USER_ID of Responder)
          example: 4
        assignedToName:
          type: string
          example: Pedro Tanod
        assignedBy:
          type: integer
          description: ASSIGNED_BY (USER_ID)
          example: 3
        isActive:
          type: boolean
          example: true
        assignedAt:
          type: string
          format: date-time
          example: 2026-06-01T09:00:00Z

    Complaint:
      type: object
      description: COMPLAINTS table. Assignment history in ComplaintAssignment.
      properties:
        complaintId:
          type: integer
          description: COMPLAINT_ID
          example: 101
        publicReference:
          type: string
          description: Public tracking code (app-generated, not in ERD)
          example: CMP-2026-00101
        residentId:
          type: integer
          nullable: true
          description: RESIDENT_ID (FK USER). Hidden from Responder; visible to Admin and owner.
          example: 1
        categoryId:
          type: integer
          description: CATEGORY_ID
          example: 1
        categoryName:
          type: string
          example: Noise Complaint
        title:
          type: string
          example: Loud karaoke until 2 AM
        description:
          type: string
          example: Neighbor is singing loudly after midnight for several nights.
        locationText:
          type: string
          description: LOCATION_TEXT
          example: Block 4, Main Road
        latitude:
          type: number
          format: double
          example: 14.5995
        longitude:
          type: number
          format: double
          example: 120.9842
        complaintStatus:
          type: string
          description: Maps to COMPLAINTS.STATUS
          enum:
            - PENDING
            - VERIFIED
            - ASSIGNED
            - IN_PROGRESS
            - RESOLVED
            - REJECTED
          example: PENDING
        priorityLevel:
          type: string
          description: PRIORITY_LEVEL
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
          example: MEDIUM
        remarks:
          type: string
          example: Initial complaint submitted by resident
        activeAssignment:
          $ref: '#/components/schemas/ComplaintAssignment'
        resolutionStatement:
          type: string
          nullable: true
          description: Resolution notes (stored in remarks or extension field on resolve)
        resolutionProofUrl:
          type: string
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          example: 2026-06-01T08:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-01T08:35:00Z

    ComplaintCreateRequest:
      type: object
      required:
        - categoryId
        - title
        - description
      properties:
        categoryId:
          type: integer
          example: 1
        title:
          type: string
          example: Loud karaoke until 2 AM
        description:
          type: string
          example: Neighbor is singing loudly after midnight for several nights.
        locationText:
          type: string
          example: Block 4, Main Road
        latitude:
          type: number
          format: double
          example: 14.5995
        longitude:
          type: number
          format: double
          example: 120.9842
        files:
          type: array
          items:
            type: string
            format: binary

    ComplaintStatusUpdateRequest:
      type: object
      required:
        - complaintStatus
      properties:
        complaintStatus:
          type: string
          enum:
            - VERIFIED
            - ASSIGNED
            - IN_PROGRESS
            - REJECTED
          example: VERIFIED
        remarks:
          type: string
          example: Complaint validated by barangay staff.

    ComplaintAssignRequest:
      type: object
      required:
        - assignedTo
      properties:
        assignedTo:
          type: integer
          description: ASSIGNED_TO userId (must be Responder or Admin role)
          example: 4
        remarks:
          type: string
          example: Assigned to responder on duty.

    ComplaintPriorityUpdateRequest:
      type: object
      required:
        - priorityLevel
      properties:
        priorityLevel:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
          example: CRITICAL
        remarks:
          type: string
          example: Escalated due to repeated incidents.

    ComplaintResolveRequest:
      type: object
      required:
        - resolutionStatement
      properties:
        resolutionStatement:
          type: string
          example: Issue addressed and resolved.
        file:
          type: string
          format: binary
          description: Optional photo proof of resolution.

    ComplaintMedia:
      type: object
      description: COMPLAINT_MEDIA table
      properties:
        mediaId:
          type: integer
          description: MEDIA_ID
          example: 1
        complaintId:
          type: integer
          example: 101
        uploadedBy:
          type: integer
          description: UPLOADED_BY (USER_ID)
          example: 1
        mediaUrl:
          type: string
          example: https://res.cloudinary.com/demo/image/upload/v1/sample.jpg
        mediaType:
          type: string
          enum:
            - IMAGE
            - VIDEO
            - RESOLUTION_PROOF
          example: IMAGE
        uploadedAt:
          type: string
          format: date-time
          example: 2026-06-01T08:32:00Z

    ComplaintMediaUploadRequest:
      type: object
      required:
        - files
      properties:
        files:
          type: array
          items:
            type: string
            format: binary

    ActivityLog:
      type: object
      description: ACTIVITY_LOGS table
      properties:
        activityLogId:
          type: integer
          description: ACTIVITY_LOG_ID
          example: 1
        complaintId:
          type: integer
          example: 101
        performedBy:
          type: integer
          description: PERFORMED_BY (USER_ID)
          example: 3
        actionType:
          type: string
          enum:
            - COMPLAINT_CREATED
            - STATUS_UPDATED
            - ASSIGNED
            - PRIORITY_CHANGED
            - RESOLVED
            - MEDIA_UPLOADED
            - MEDIA_DELETED
            - VERIFICATION_REVIEWED
          example: STATUS_UPDATED
        oldValue:
          type: string
          example: PENDING
        newValue:
          type: string
          example: ASSIGNED
        description:
          type: string
          example: Complaint status changed from PENDING to ASSIGNED
        createdAt:
          type: string
          format: date-time
          example: 2026-06-01T09:15:00Z

    EmergencyHotline:
      type: object
      description: EMERGENCY_HOTLINES table
      properties:
        hotlineId:
          type: integer
          description: HOTLINE_ID
          example: 1
        agencyName:
          type: string
          example: Barangay Hall
        contactNumber:
          type: string
          example: "09171234567"
        description:
          type: string
          example: Main emergency hotline for community concerns

    EmergencyHotlineCreateRequest:
      type: object
      required:
        - agencyName
        - contactNumber
      properties:
        agencyName:
          type: string
          example: Barangay Hall
        contactNumber:
          type: string
          example: "09171234567"
        description:
          type: string
          example: Main emergency hotline for community concerns

    EmergencyHotlineUpdateRequest:
      type: object
      properties:
        agencyName:
          type: string
          example: Barangay Hall
        contactNumber:
          type: string
          example: "09171234567"
        description:
          type: string
          example: Updated description

    DashboardSummary:
      type: object
      properties:
        totalComplaints:
          type: integer
          example: 120
        pendingComplaints:
          type: integer
          example: 15
        verifiedComplaints:
          type: integer
          example: 20
        assignedComplaints:
          type: integer
          example: 18
        inProgressComplaints:
          type: integer
          example: 12
        resolvedComplaints:
          type: integer
          example: 50
        rejectedComplaints:
          type: integer
          example: 5
        totalUsers:
          type: integer
          example: 240
        totalResidents:
          type: integer
          example: 210
        totalHotlines:
          type: integer
          example: 8

    DashboardRecentComplaint:
      type: object
      properties:
        complaintId:
          type: integer
          example: 101
        publicReference:
          type: string
          example: CMP-2026-00101
        title:
          type: string
          example: Loud karaoke until 2 AM
        complaintStatus:
          type: string
          example: PENDING
        priorityLevel:
          type: string
          example: HIGH
        createdAt:
          type: string
          format: date-time
          example: 2026-06-01T08:30:00Z

    PaginatedComplaintResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Complaints retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/Complaint'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 10
            totalItems:
              type: integer
              example: 120
            totalPages:
              type: integer
              example: 12

    SingleComplaintResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Complaint retrieved successfully
        data:
          $ref: '#/components/schemas/Complaint'

    ComplaintMediaResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Media uploaded successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/ComplaintMedia'

    ActivityLogListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Activity logs retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/ActivityLog'

    HotlineListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Emergency hotlines retrieved successfully
        data:
          type: array
          items:
            $ref: '#/components/schemas/EmergencyHotline'

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register resident
      description: Create a new resident account. Submit community verification separately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              example1:
                value:
                  firstName: Juan
                  lastName: Dela Cruz
                  email: juan.delacruz@example.com
                  password: P@ssw0rd123
                  phoneNumber: "09171234567"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registration successful
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      description: Authenticate a user and return JWT tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example1:
                value:
                  email: resident@example.com
                  password: P@ssw0rd123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      tokens:
                        $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      description: Get the profile of the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Current user retrieved successfully
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      description: Invalidate the current refresh token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Generate a new access token using a valid refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Token refreshed successfully
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me/verification:
    post:
      tags:
        - Verifications
      summary: Submit community verification
      description: Resident uploads proof of residency. File is deleted after admin review.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerificationSubmitRequest'
      responses:
        '200':
          description: Verification submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Verification submitted successfully
                  data:
                    $ref: '#/components/schemas/ResidentVerification'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}/verification:
    get:
      tags:
        - Verifications
      summary: Get resident verification
      description: Resident (own record) or Admin. Latest RESIDENT_VERIFICATIONS row for user.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Verification retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Verification retrieved successfully
                  data:
                    $ref: '#/components/schemas/ResidentVerification'
        '403':
          description: Forbidden
        '404':
          description: Verification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - Users
      summary: Get users
      description: Admin only. Returns user list with optional filters.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: roleId
          schema:
            type: integer
          description: Filter by role ID
        - in: query
          name: isActive
          schema:
            type: boolean
          description: Filter by active status
        - in: query
          name: status
          schema:
            type: string
            enum:
              - PENDING
              - APPROVED
              - REJECTED
          description: Filter by latest RESIDENT_VERIFICATIONS.STATUS
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: User list retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Users retrieved successfully
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                        example: 1
                      limit:
                        type: integer
                        example: 10
                      totalItems:
                        type: integer
